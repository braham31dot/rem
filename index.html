<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Chat Application</title>\n    <style>\n        /* Add necessary styles for mobile layout */\n        .chat-form-wrapper {\n            border: none; /* Removed bottom border */\n        }\n        .send-button {\n            position: relative;\n            float: right; /* Moves send button to the side */\n        }\n        .header-buttons {\n            text-align: center; /* Center header buttons on mobile */\n        }\n        /* Additional styles for responsiveness */\n        @media (max-width: 600px) {\n            .header-buttons {\n                display: flex;\n                justify-content: center;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class="header-buttons">\n        <button>Header 1</button>\n        <button>Header 2</button>\n    </div>\n    <form class="chat-form-wrapper">\n        <input type="text" placeholder="Type a message...">\n        <button class="send-button">Send</button>\n    </form>\n</body>\n</html>

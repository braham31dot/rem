        html {

            user-select: none;

            * {

                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        function getRemedy(tradition, concern) {
            const advice = remedies[tradition]?.[concern];
            if (!advice) {
                return "Please rest, stay hydrated, and consult a healthcare professional.";
            }
            
            if (concern === "STD") {
                return advice;
            }
            
            return `${advice}\n\n${SAFETY_WARNING}`;
        }

        function handleSubmit(e) {
            e.preventDefault();
            
            if (!appState.tradition || !appState.concern) {
                alert("Please select both tradition and concern.");
                return;
            }
            
            const userMsg = {
                id: Date.now().toString(),
                role: "user",
                content: `${appState.tradition} guidance for ${appState.concern}`
            };
            
            appState.messages.push(userMsg);
            appState.isTyping = true;
            renderApp();
            
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
            
            setTimeout(() => {
                const responseContent = getRemedy(appState.tradition, appState.concern);
                const botMsg = {
                    id: (Date.now() + 1).toString(),
                    role: "bot",
                    content: responseContent,
                    isWarning: appState.concern === "STD"
                };
                
                appState.messages.push(botMsg);
                appState.isTyping = false;
                appState.tradition = "";
                appState.concern = "";
                renderApp();
            }, 1500);
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // APP INITIALIZATION
        // ============================================

        window.addEventListener("DOMContentLoaded", () => {
            initTheme();
            renderApp();
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (!localStorage.getItem('remedy-theme')) {
                document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
                renderApp();
            }
        });

        // Expose functions globally
        window.toggleTheme = toggleTheme;
        window.handleSubmit = handleSubmit;
        window.goToChat = goToChat;
        window.goToAbout = goToAbout;
        window.goToPrivacy = goToPrivacy;
        window.goToWelcome = goToWelcome;
    </script>
</body>
</html>

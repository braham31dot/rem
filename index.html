        function initTheme() {
            const savedTheme = localStorage.getItem('remedy-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);

            const savedColor = localStorage.getItem('remedy-color') || 'emerald';
            currentColor = savedColor;
            document.documentElement.setAttribute('data-color', savedColor);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('remedy-theme', newTheme);
            renderApp();
        }

        function changeColor(color) {
            currentColor = color;
            document.documentElement.setAttribute('data-color', color);
            localStorage.setItem('remedy-color', color);
            appState.colorMenuOpen = false;
            renderApp();
        }

        function changeLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('remedy-language', lang);
            appState.langMenuOpen = false;
            renderApp();
        }

        function t(key) {
            return translations[currentLanguage]?.[key] || translations['en'][key] || key;

            }

            return `${advice}\n\n${t('safetyWarning')}`;
        }

            currentPage = 'chat';
            appState.loading = false;
            appState.messages = [
                {
                    id: "init",
                    role: "bot",
                    content: t('botWelcome')
                }
            ];
            renderApp();
        }

        function goToAbout() {
            currentPage = 'about';
            renderApp();
        }

        function goToPrivacy() {
            currentPage = 'privacy';
            renderApp();
        }

        function goToWelcome() {
            currentPage = 'welcome';
            appState.messages = [];
            appState.tradition = "";
            appState.concern = "";
            appState.isTyping = false;
            renderApp();
        }

        function toggleLangMenu() {
            appState.langMenuOpen = !appState.langMenuOpen;
            appState.colorMenuOpen = false;
            renderApp();
        }

        function toggleColorMenu() {
            appState.colorMenuOpen = !appState.colorMenuOpen;
            appState.langMenuOpen = false;
            renderApp();
        }

                    container.scrollTop = container.scrollHeight;

            const traditionalSelect = document.getElementById("tradition");
            const concernSelect = document.getElementById("concern");
            
            if (traditionalSelect) {
                traditionalSelect.addEventListener("change", (e) => {
                    appState.tradition = e.target.value;
                });
            }
            
            if (concernSelect) {
                concernSelect.addEventListener("change", (e) => {
                    appState.concern = e.target.value;
                });
            }
        }

        function handleSubmit(e) {
            e.preventDefault();
            
            if (!appState.tradition || !appState.concern) {
                alert("Please select both tradition and concern.");
                return;
            }
            
            const userMsg = {
                id: Date.now().toString(),
                role: "user",
                content: `${appState.tradition} guidance for ${appState.concern}`
            };
            
            appState.messages.push(userMsg);
            appState.isTyping = true;
            renderApp();
            
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
            
            setTimeout(() => {
                const responseContent = getRemedyContent(appState.tradition, appState.concern);
                const botMsg = {
                    id: (Date.now() + 1).toString(),
                    role: "bot",
                    content: responseContent,
                    isWarning: appState.concern === "STD"
                };
                
                appState.messages.push(botMsg);
                appState.isTyping = false;
                appState.tradition = "";
                appState.concern = "";
                renderApp();
            }, 1500);
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // APP INITIALIZATION
        // ============================================

        window.addEventListener("DOMContentLoaded", () => {
            const savedLang = localStorage.getItem('remedy-language');
            if (savedLang) {
                currentLanguage = savedLang;
            }
            initTheme();
            renderApp();
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (!localStorage.getItem('remedy-theme')) {
                document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
                renderApp();
            }
        });

        // Expose functions globally
        window.toggleTheme = toggleTheme;
        window.changeColor = changeColor;
        window.changeLanguage = changeLanguage;
        window.toggleLangMenu = toggleLangMenu;
        window.toggleColorMenu = toggleColorMenu;
        window.handleSubmit = handleSubmit;
        window.goToChat = goToChat;
        window.goToAbout = goToAbout;
        window.goToPrivacy = goToPrivacy;
        window.goToWelcome = goToWelcome;
    </script>
